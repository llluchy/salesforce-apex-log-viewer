<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salesforce Apex Log Viewer</title>
  <link rel="stylesheet" href="window.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="activity-timer" id="activityTimer">
        <span class="timer-label">不活跃:</span>
        <span class="timer-value" id="activityTimerValue">300</span>
        <span class="timer-unit">s</span>
      </div>
      <h1>Salesforce Apex Log Viewer</h1>
      <div class="header-right">
        <div class="user-info" id="userInfo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <span id="userName">-</span>
        </div>
        <div class="env-switcher">
          <select id="envSelector" class="env-select">
            <option value="">选择环境</option>
          </select>
          <button id="connectBtn" class="btn btn-primary">连接</button>
          <button id="disconnectBtn" class="btn btn-secondary" style="display:none">断开</button>
          <button id="refreshBtn" class="btn btn-icon" title="刷新">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0118.8-4.3M22 12.5a10 10 0 01-18.8 4.2"></path>
            </svg>
          </button>
          <button id="togglePollingBtn" class="btn btn-icon" title="自动刷新">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M12 1v4M12 19v4M4.2 4.2l2.8 2.8M17 17l2.8 2.8M1 12h4M19 12h4M4.2 19.8l2.8-2.8M17 7l2.8-2.8"></path>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <div class="content">
      <div class="welcome-view" id="welcomeView">
        <div class="welcome-content">
          <svg class="welcome-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M9 12l2 2 4-4"></path>
          </svg>
          <h2>欢迎使用</h2>
          <p>选择并连接 Salesforce 环境以开始查看 Apex Log</p>
          <p class="hint">提示：在 Salesforce 页面上打开窗口可以自动识别当前环境</p>
        </div>
      </div>

      <div class="main-view" id="mainView" style="display:none">
        <div class="sidebar">
          <div class="toolbar">
            <div class="toolbar-top">
              <button id="markAllReadBtn" class="btn btn-secondary btn-small">全部已读</button>
            </div>
            <div class="filter-section">
              <div class="filter-header" data-filter-group="app">
                <div class="filter-label">应用类型：</div>
                <button class="filter-toggle">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </button>
              </div>
              <div class="filter-content" id="filterButtons">
                <button class="filter-btn active" data-filter="">全部</button>
                <button class="filter-btn" data-filter="Api">API</button>
                <button class="filter-btn" data-filter="Browser">Browser</button>
                <button class="filter-btn" data-filter="System">System</button>
              </div>
            </div>
            <div class="filter-section">
              <div class="filter-header" data-filter-group="status">
                <div class="filter-label">状态：</div>
                <button class="filter-toggle">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </button>
              </div>
              <div class="filter-content" id="statusFilterButtons">
                <button class="filter-btn active" data-status="">全部</button>
                <button class="filter-btn" data-status="success">成功</button>
                <button class="filter-btn" data-status="error">失败</button>
              </div>
            </div>
            <div class="filter-section">
              <div class="filter-header" data-filter-group="user">
                <div class="filter-label">用户：</div>
                <button class="filter-toggle">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </button>
              </div>
              <div class="filter-content" id="userFilterButtons">
                <button class="filter-btn active" data-user="all">所有用户</button>
                <button class="filter-btn" data-user="current" id="currentUserBtn">当前用户</button>
              </div>
            </div>
          </div>

          <div class="logs-header">
            <div class="logs-count" id="logsCount">0</div>
          </div>

          <div class="polling-bar-container">
            <div class="polling-bar" id="pollingBar"></div>
            <span class="polling-interval" id="pollingInterval">3s</span>
          </div>

          <div class="logs-container">
            <div class="loading-state" id="loadingState">
              <div class="spinner"></div>
              <span>加载中...</span>
            </div>
            <div class="empty-state" id="emptyState" style="display:none">
              <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                <path d="M3 9h18M8 3v4M16 3v4"></path>
              </svg>
              <p>暂无日志</p>
              <span class="hint">在 Salesforce 中执行操作后，日志将显示在这里</span>
            </div>
            <div class="logs-list" id="logsList"></div>
          </div>
        </div>

        <div class="detail-panel">
          <div class="detail-empty" id="detailEmpty">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path>
            </svg>
            <h3>选择日志查看详情</h3>
            <p>点击左侧列表中的日志，查看详细内容</p>
          </div>
          <div class="detail-content" id="detailContent" style="display:none">
            <div class="detail-header">
              <div class="detail-meta" id="detailMeta"></div>
              <button id="downloadBtn" class="btn btn-icon" title="下载">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 3v12"></path>
                </svg>
              </button>
            </div>
            <div class="detail-body">
              <pre class="log-body" id="logBody"></pre>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="window.js"></script>
</body>
</html>
